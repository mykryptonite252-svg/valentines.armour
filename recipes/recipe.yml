---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: valentines.armour
description: Valentine's hardened KDE operating system for Dell Intel and NVIDIA hardware.

base-image: ghcr.io/secureblue/kinoite-nvidia-open-hardened
image-version: 44

modules:
  - type: dnf
    repos:
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo

    install:
      packages:
        - acpica-tools
        - android-tools
        - brave-origin
        - clamav
        - clamav-freshclam
        - clamd
        - lm_sensors
        - v4l-utils

    remove:
      packages:
        # Unused camera/scanner backend
        - sane-backends-drivers-cameras

        # Professional JACK compatibility; normal audio remains
        - pipewire-jack-audio-connection-kit
        - pipewire-jack-audio-connection-kit-libs

        # Cellular-modem firmware support
        - fwupd-plugin-modem-manager

        # YubiKey management
        - yubikey-manager
        - python3-yubikey-manager
        - libyubikey

        # Unwanted KDE applications and optional widgets
        - plasma-welcome
        - plasma-emojier
        - kde-connect
        - krdc
        - krfb
        - kdeplasma-addons

        # OpenVPN; WireGuard remains
        - openvpn
        - NetworkManager-openvpn
        - NetworkManager-openvpn-gnome

        # Avahi/mDNS and AirPlay discovery
        - avahi
        - avahi-tools
        - nss-mdns
        - pipewire-config-raop

        # KDE games
        - kmines
        - kpat
        - ksudoku
        - kmahjongg
        - knetwalk
        - knavalbattle
        - konquest
        - kapman
        - kbreakout
        - kblocks
        - kbounce
        - kdiamond
        - kgoldrunner
        - kigo
        - kiriki
        - klines
        - kolf
        - kollision
        - kshisen
        - ksirk
        - kspaceduel
        - ksquares
        - ktuberling
        - kubrick
        - lskat

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - hu.irl.cameractrls
          - com.github.tchx84.Flatseal
          - org.keepassxc.KeePassXC
          - it.belloworld.mercurygram
          - io.mpv.Mpv
          - com.tutanota.Tutanota
          - io.github.flattool.Warehouse
          - us.zoom.Zoom
          - com.github.qarmin.czkawka
          - io.ente.auth

  - type: signing
